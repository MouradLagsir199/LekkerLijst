name: Catalog Gold Categorization

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Start creates a Batch ID; after completion use that ID to finish.
        required: true
        default: start
        type: choice
        options: [start, status, finish]
      batch_id:
        description: Required for status and finish stages.
        required: false
        type: string

jobs:
  gold:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_CATALOG_MODEL: gpt-5.4-mini
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scrapers/requirements.txt
      - name: Start one-time Batch API categorization
        if: inputs.stage == 'start'
        run: |
          python scrapers/catalog_gold.py export --out data/catalog-gold/silver.json
          python scrapers/catalog_gold.py prepare-batch --input data/catalog-gold/silver.json --requests data/catalog-gold/requests.jsonl --manifest data/catalog-gold/manifest.json
          python scrapers/catalog_gold.py submit-batch --requests data/catalog-gold/requests.jsonl --metadata data/catalog-gold/batch.json
      - name: Check Batch API status
        if: inputs.stage == 'status'
        run: python scrapers/catalog_gold.py status --batch-id "${{ inputs.batch_id }}"
      - name: Download, parse, and promote Batch API results
        if: inputs.stage == 'finish'
        run: |
          python scrapers/catalog_gold.py download-batch --batch-id "${{ inputs.batch_id }}" --out data/catalog-gold/results.jsonl
          python scrapers/catalog_gold.py parse-batch --input data/catalog-gold/results.jsonl --out data/catalog-gold/mappings.json
          python scrapers/catalog_gold.py apply --from-current --mappings data/catalog-gold/mappings.json
