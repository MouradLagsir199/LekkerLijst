name: Catalog Scraper Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "AH/**"
      - "Jumbo/**"
      - "Dirk/**"
      - "Plus/**"
      - "scrapers/**"
      - ".github/workflows/catalog-*.yml"

jobs:
  normalize-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipeline dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Test normalizer
        working-directory: scrapers
        run: python -m unittest test_catalog_pipeline.py test_catalog_gold.py test_catalog_match_eval.py
      - name: Test PLUS version recovery
        working-directory: Plus
        run: python -m unittest test_plus_scraper.py
      - name: Test Jumbo transient retry
        working-directory: Jumbo
        run: python -m unittest test_jumbo_scraper.py
