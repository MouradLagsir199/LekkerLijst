name: Catalog Ingest

on:
  workflow_dispatch:
    inputs:
      store:
        description: Store to scrape
        required: true
        default: all
        type: choice
        options: [all, ah, jumbo, dirk, plus]
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: catalog-ingest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        store: [ah, jumbo, dirk, plus]
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Prepare raw output directory
        run: mkdir -p data/raw
      - name: Scrape AH
        if: matrix.store == 'ah' && (github.event_name == 'schedule' || inputs.store == 'all' || inputs.store == matrix.store)
        run: python AH/ah_scraper.py --out data/raw/ah_products.csv --concurrency 6
      - name: Scrape Jumbo
        if: matrix.store == 'jumbo' && (github.event_name == 'schedule' || inputs.store == 'all' || inputs.store == matrix.store)
        run: python Jumbo/jumbo_scraper.py --all --out data/raw/jumbo_products.csv --concurrency 2
      - name: Scrape Dirk
        if: matrix.store == 'dirk' && (github.event_name == 'schedule' || inputs.store == 'all' || inputs.store == matrix.store)
        run: python Dirk/dirk_scraper.py --all --out data/raw/dirk_products.csv --concurrency 6
      - name: Scrape PLUS
        if: matrix.store == 'plus' && (github.event_name == 'schedule' || inputs.store == 'all' || inputs.store == matrix.store)
        run: python Plus/plus_scraper.py --all --out data/raw/plus_products.csv --concurrency 6
      - name: Upload bronze and write silver
        if: github.event_name == 'schedule' || inputs.store == 'all' || inputs.store == matrix.store
        run: python scrapers/catalog_pipeline.py ingest --store ${{ matrix.store }} --csv data/raw/${{ matrix.store }}_products.csv
