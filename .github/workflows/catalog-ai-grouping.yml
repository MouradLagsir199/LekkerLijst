name: Catalog AI Grouping Review

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum pending candidates to send to AI"
        required: false
        default: "25"
        type: string
      kind:
        description: "Candidate kind"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - exact
          - substitute
      dry_run:
        description: "Fetch candidates without calling OpenAI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: catalog-ai-grouping-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ai-review:
    name: AI Review Grouping Candidates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_CATALOG_MODEL: ${{ secrets.OPENAI_CATALOG_MODEL }}
      LIMIT: ${{ inputs.limit || '25' }}
      KIND: ${{ inputs.kind || 'all' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "scrapers/requirements.txt"

      - name: Install dependencies
        run: python -m pip install -r scrapers/requirements.txt

      - name: Check required secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Missing SUPABASE_DB_URL secret"
            exit 1
          fi
          if [ "$DRY_RUN" != "true" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing OPENAI_API_KEY secret. Add it before running non-dry catalog AI grouping."
            exit 1
          fi

      - name: Run AI review
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
            echo "::error::limit must be a positive integer"
            exit 1
          fi

          args=(--limit "$LIMIT" --kind "$KIND")
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          python scripts/catalog_ai_grouping.py "${args[@]}"
