name: Catalog Local Rebuild

on:
  schedule:
    # Daily at 02:17 UTC. In the Netherlands that is 03:17/04:17 depending on DST.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      store:
        description: "Store to scrape, or all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ah
          - jumbo
          - dirk
          - plus
          - spar
          - aldi
      limit:
        description: "Optional smoke-test product limit. Limited runs do not sync hosted."
        required: false
        type: string
      no_detail:
        description: "Skip detail hydration where supported."
        required: false
        default: false
        type: boolean
      plus_sleep:
        description: "Delay between PLUS requests."
        required: false
        default: "0.1"
        type: string
      plus_detail:
        description: "Run the very slow PLUS PDP detail hydration."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: catalog-local-rebuild-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.store || 'all' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan Stores
    runs-on: ubuntu-latest
    outputs:
      stores: ${{ steps.stores.outputs.stores }}
      selected_store: ${{ steps.stores.outputs.selected_store }}
    steps:
      - name: Select stores
        id: stores
        env:
          SELECTED_STORE: ${{ inputs.store || 'all' }}
        run: |
          case "$SELECTED_STORE" in
            all|"")
              echo 'stores=["ah","jumbo","dirk","plus","spar","aldi"]' >> "$GITHUB_OUTPUT"
              echo "selected_store=all" >> "$GITHUB_OUTPUT"
              ;;
            ah|jumbo|dirk|plus|spar|aldi)
              echo "stores=[\"$SELECTED_STORE\"]" >> "$GITHUB_OUTPUT"
              echo "selected_store=$SELECTED_STORE" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported store: $SELECTED_STORE"
              exit 1
              ;;
          esac

  scrape:
    name: Scrape (${{ matrix.store }})
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        store: ${{ fromJson(needs.plan.outputs.stores) }}

    env:
      STORE: ${{ matrix.store }}
      LIMIT: ${{ inputs.limit || '' }}
      NO_DETAIL: ${{ inputs.no_detail || 'false' }}
      PLUS_SLEEP: ${{ inputs.plus_sleep || '0.1' }}
      PLUS_DETAIL: ${{ inputs.plus_detail || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "scrapers/requirements.txt"

      - name: Install scraper dependencies
        run: python -m pip install -r scrapers/requirements.txt

      - name: Run scraper
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Output

          args=()
          if [ -n "$LIMIT" ]; then
            if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
              echo "::error::limit must be a positive integer"
              exit 1
            fi
            args+=(--limit "$LIMIT")
          fi

          if [ "$NO_DETAIL" = "true" ]; then
            case "$STORE" in
              ah|jumbo|plus|aldi) args+=(--no-detail) ;;
              *) echo "Store $STORE does not support --no-detail; ignoring." ;;
            esac
          fi

          if [ "$STORE" = "plus" ]; then
            if [[ ! "$PLUS_SLEEP" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
              echo "::error::plus_sleep must be numeric"
              exit 1
            fi
            if [ "$PLUS_DETAIL" != "true" ]; then
              args+=(--no-detail)
            fi
            args+=(--sleep "$PLUS_SLEEP")
          fi

          if [ "$STORE" = "jumbo" ]; then
            args+=(--concurrency 1)
          fi

          python -m "scrapers.${STORE}" "${args[@]}"

      - name: Summarize artifact
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          store = os.environ["STORE"]
          path = Path("Output") / f"{store}_bronze.jsonl"
          rows = sum(1 for line in path.open(encoding="utf-8") if line.strip())
          size = path.stat().st_size
          message = (
              f"## {store.upper()} bronze artifact\n\n"
              f"- Path: `{path}`\n"
              f"- Rows: `{rows}`\n"
              f"- Size: `{size}` bytes\n"
          )
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(message, encoding="utf-8")
          print(message)
          PY

      - name: Upload bronze JSONL artifact
        uses: actions/upload-artifact@v4
        with:
          name: bronze-${{ matrix.store }}-${{ github.run_id }}
          path: Output/${{ matrix.store }}_bronze.jsonl
          if-no-files-found: error
          retention-days: 14

  build-and-sync:
    name: Build Local Catalog + Sync Hosted
    needs:
      - plan
      - scrape
    runs-on: ubuntu-latest
    timeout-minutes: 360
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LOCAL_CATALOG_DB_URL: postgresql://postgres:localdev@localhost:5432/postgres
      STORES_JSON: ${{ needs.plan.outputs.stores }}
      SELECTED_STORE: ${{ needs.plan.outputs.selected_store }}
      LIMIT: ${{ inputs.limit || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "scrapers/requirements.txt"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          python -m pip install -r scrapers/requirements.txt

      - name: Check hosted database secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Missing GitHub secret SUPABASE_DB_URL. Use the Supabase session pooler Postgres URL with sslmode=require."
            exit 1
          fi

      - name: Bootstrap local catalog schema
        run: psql "$LOCAL_CATALOG_DB_URL" -v ON_ERROR_STOP=1 -f scrapers/local_catalog_schema.sql

      - name: Seed canonical mappings from hosted products
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m scrapers.seed_local_catalog

      - name: Download bronze artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bronze-*-${{ github.run_id }}
          path: Output
          merge-multiple: true

      - name: Ingest bronze and refresh silver locally
        shell: bash
        env:
          SUPABASE_DB_URL: ${{ env.LOCAL_CATALOG_DB_URL }}
        run: |
          set -euo pipefail
          mapfile -t stores < <(python - <<'PY'
          import json, os
          for store in json.loads(os.environ["STORES_JSON"]):
              print(store)
          PY
          )

          for store in "${stores[@]}"; do
            input="Output/${store}_bronze.jsonl"
            if [ ! -s "$input" ]; then
              echo "::error::Missing or empty artifact $input"
              exit 1
            fi

            python -m scrapers.bronze_ingest --store "$store" --input "$input" --dry-run
            python -m scrapers.bronze_ingest --store "$store" --input "$input"

            psql "$LOCAL_CATALOG_DB_URL" -v ON_ERROR_STOP=1 \
              -c "SELECT store_id, rows_refreshed FROM catalog.refresh_silver_products('$store');"

            IFS='|' read -r rows missing_name missing_price missing_image < <(
              psql "$LOCAL_CATALOG_DB_URL" -v ON_ERROR_STOP=1 -At -F '|' \
                -c "SELECT count(*)::int,
                           count(*) FILTER (WHERE name IS NULL)::int,
                           count(*) FILTER (WHERE price IS NULL)::int,
                           count(*) FILTER (WHERE image_url IS NULL)::int
                    FROM catalog.silver_products
                    WHERE store = '$store';"
            )
            echo "$store: silver_rows=$rows missing_name=$missing_name missing_price=$missing_price missing_image=$missing_image"
            if [ "$rows" -le 0 ] || [ "$missing_name" -ne 0 ]; then
              echo "::error::$store local silver validation failed"
              exit 1
            fi
          done

      - name: Promote and group local products
        shell: bash
        run: |
          set -euo pipefail
          psql "$LOCAL_CATALOG_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          SELECT * FROM catalog.promote_to_public(NULL);
          SELECT catalog.refresh_canonical_baseline() AS baseline_rows;
          SELECT * FROM catalog.apply_canonical_prepass();
          SELECT catalog.apply_canonical_keys() AS canonical_rows_applied;
          SQL

      - name: Validate local products
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import psycopg
          from pathlib import Path

          dsn = os.environ["LOCAL_CATALOG_DB_URL"]
          with psycopg.connect(dsn, prepare_threshold=None) as conn:
              rows = conn.execute(
                  """
                  SELECT
                    count(*)::int AS products,
                    count(*) FILTER (WHERE external_id IS NULL)::int AS missing_external_id,
                    count(*) FILTER (WHERE canonical_key IS NULL)::int AS missing_canonical,
                    count(DISTINCT canonical_key)::int AS canonical_groups,
                    (SELECT count(*)::int FROM (
                      SELECT canonical_key
                      FROM public.products
                      WHERE canonical_key IS NOT NULL
                      GROUP BY canonical_key
                      HAVING count(DISTINCT store_id) > 1
                    ) s) AS multistore_groups
                  FROM public.products
                  """
              ).fetchone()
              cola = conn.execute(
                  "SELECT store_id, product_name, current_price_cents, canonical_key FROM public.search_product_offers('cola')"
              ).fetchall()
              komkommer = conn.execute(
                  "SELECT store_id, product_name, current_price_cents, canonical_key FROM public.search_product_offers('komkommer')"
              ).fetchall()

          products, missing_external_id, missing_canonical, groups, multistore = rows
          if products <= 0 or missing_external_id or missing_canonical:
              raise SystemExit(f"local products invalid: {rows}")
          if not cola or {r[3] for r in cola} != {"cola"}:
              raise SystemExit(f"cola offer group did not resolve to canonical_key=cola: {cola}")

          message = (
              "## Local catalog validation\n\n"
              f"- Products: `{products}`\n"
              f"- Missing external_id: `{missing_external_id}`\n"
              f"- Missing canonical_key: `{missing_canonical}`\n"
              f"- Canonical groups: `{groups}`\n"
              f"- Multi-store groups: `{multistore}`\n"
              f"- Cola offers: `{len(cola)}` rows, keys `{sorted({r[3] for r in cola})}`\n"
              f"- Komkommer offers: `{len(komkommer)}` rows, keys `{sorted({r[3] for r in komkommer})}`\n"
          )
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(message, encoding="utf-8")
          print(message)
          PY

      - name: Sync hosted products
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [ "$SELECTED_STORE" != "all" ]; then
            args+=(--store "$SELECTED_STORE")
          fi

          python -m scrapers.sync_products --dry-run "${args[@]}"

          if [ -n "$LIMIT" ]; then
            echo "Limited smoke run detected; skipping hosted sync."
            exit 0
          fi

          python -m scrapers.sync_products "${args[@]}"

      - name: Verify hosted products
        if: ${{ inputs.limit == '' || inputs.limit == null }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import psycopg

          dsn = os.environ["SUPABASE_DB_URL"]
          if "sslmode=" not in dsn:
              dsn += ("&" if "?" in dsn else "?") + "sslmode=require"

          with psycopg.connect(dsn, prepare_threshold=None) as conn:
              counts = conn.execute(
                  """
                  SELECT
                    pg_size_pretty(pg_database_size(current_database())),
                    (SELECT count(*)::int FROM public.products),
                    (SELECT count(*)::int FROM information_schema.schemata WHERE schema_name='catalog'),
                    (SELECT count(*)::int FROM public.products WHERE external_id IS NULL),
                    (SELECT count(*)::int FROM public.products WHERE canonical_key IS NULL),
                    (SELECT count(DISTINCT canonical_key)::int FROM public.products)
                  """
              ).fetchone()
              cola = conn.execute(
                  "SELECT store_id, product_name, current_price_cents, canonical_key FROM public.search_product_offers('cola')"
              ).fetchall()

          if counts[2] != 0 or counts[3] != 0 or counts[4] != 0:
              raise SystemExit(f"hosted verification failed: {counts}")
          if not cola or {r[3] for r in cola} != {"cola"}:
              raise SystemExit(f"hosted cola offer group did not resolve to canonical_key=cola: {cola}")

          print(
              "hosted verification: "
              f"db_size={counts[0]} products={counts[1]} catalog_schema={counts[2]} "
              f"missing_external_id={counts[3]} missing_canonical_key={counts[4]} "
              f"canonical_groups={counts[5]} cola_rows={len(cola)}"
          )
          PY
